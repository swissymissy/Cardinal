<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feed – Cardinal</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="search-bar" style="margin-bottom:16px">
      <input type="text" id="searchInput" placeholder="Search users by username or user ID" />
      <button class="btn btn-primary" onclick="searchUser()">Search</button>
    </div>
    <div id="searchResult" style="margin-bottom:16px"></div>

    <div class="compose-box">
      <textarea id="chirpInput" placeholder="What's happening?"></textarea>
      <div class="compose-footer">
        <span id="charCount" style="font-size:0.8rem;color:var(--text-muted);margin-right:10px"></span>
        <button class="btn btn-primary" onclick="postChirp()">Post</button>
      </div>
    </div>

    <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)">
      <button class="profile-tab active" id="tabFollowing" onclick="switchTab('following')">Following</button>
      <button class="profile-tab" id="tabDiscover" onclick="switchTab('discover')">Discover</button>
    </div>

    <div id="feed"></div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-outline" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load more</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    requireAuth();
    initNav();

    const MAX_CHARS = 500;
    const LIMIT = 20;
    const chirpInput = document.getElementById("chirpInput");

    let currentTab = "following";
    let followingCursor = null;
    let discoverCursor = null;

    chirpInput.addEventListener("input", () => {
      const el = document.getElementById("charCount");
      el.textContent = `${chirpInput.value.length}/${MAX_CHARS}`;
      el.style.color = chirpInput.value.length > MAX_CHARS - 20 ? "#b91c1c" : "var(--text-muted)";
    });

    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchUser();
    });

    async function searchUser() {
      const query = document.getElementById("searchInput").value.trim();
      const resultEl = document.getElementById("searchResult");
      if (!query) { resultEl.innerHTML = ""; return; }

      const res = await apiRequestAuth(`/api/users/${encodeURIComponent(query)}`, "GET");

      if (!res || res.status === 404) {
        resultEl.innerHTML = `<div class="empty-state">No user found for "<strong>${escapeHTML(query)}</strong>".</div>`;
        return;
      }
      if (!res.ok) {
        resultEl.innerHTML = `<div class="empty-state">Something went wrong. Try again.</div>`;
        return;
      }

      const user = await res.json();
      resultEl.innerHTML = `
        <div class="card" style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-weight:700">@${escapeHTML(user.username)}</div>
            <div style="font-size:0.85rem;color:var(--text-muted);margin-top:2px">${user.followers_count} followers · ${user.followings_count} following</div>
          </div>
          <a href="/profile.html?user=${user.id}" class="btn btn-primary btn-sm">View Profile</a>
        </div>
      `;
    }

    async function postChirp() {
      const body = chirpInput.value.trim();
      if (!body || body.length > MAX_CHARS) return;
      const res = await apiRequestAuth("/api/newchirp", "POST", { body });
      if (!res || !res.ok) { alert("Failed to post chirp."); return; }
      chirpInput.value = "";
      document.getElementById("charCount").textContent = "";
      followingCursor = null;
      discoverCursor = null;
      document.getElementById("feed").innerHTML = "";
      loadChirps();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tabFollowing").classList.toggle("active", tab === "following");
      document.getElementById("tabDiscover").classList.toggle("active", tab === "discover");
      document.getElementById("feed").innerHTML = "";
      document.getElementById("loadMoreBtn").style.display = "none";
      followingCursor = null;
      discoverCursor = null;
      loadChirps();
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return date.toLocaleDateString();
    }

    function renderChirps(chirps, append) {
      const feed = document.getElementById("feed");
      const myID = getCurrentUserID();

      if (!append && chirps.length === 0) {
        feed.innerHTML = currentTab === "following"
          ? `<div class="empty-state">No chirps yet. Follow some users to see their chirps here.</div>`
          : `<div class="empty-state">No chirps yet. Be the first to post!</div>`;
        return;
      }

      const html = chirps.map(chirp => `
        <div class="chirp-card" id="chirp-${chirp.id}">
          <div class="chirp-card-header">
            <a class="chirp-author" href="/profile.html?user=${escapeHTML(chirp.user_id)}">@${escapeHTML(chirp.username)}</a>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="chirp-time">${formatTime(chirp.created_at)}</span>
              ${chirp.user_id === myID ? `<button class="btn btn-sm btn-danger" onclick="deleteChirp('${chirp.id}')">Delete</button>` : ""}
            </div>
          </div>
          <div class="chirp-body">${escapeHTML(chirp.body)}</div>

          <!-- reaction bar -->
          <div class="reaction-bar" id="reactions-${chirp.id}" data-user-reaction="">
            <span class="reaction-summary" onclick="toggleReactionPanel('${chirp.id}'); event.stopPropagation()">
              <span id="reaction-icon-${chirp.id}">❤️</span>
              <span id="reaction-count-${chirp.id}">${chirp.reaction_count || 0}</span>
              ›
            </span>
          </div>
          
          <!-- reaction panel -->
          <div class="reaction-panel" id="reaction-panel-${chirp.id}" style="display:none">
              <div class="reaction-picker-row">
                  ${REACTIONS.map(emoji => `
                      <button
                          class="reaction-emoji-btn"
                          id="react-${chirp.id}-${encodeURIComponent(emoji)}"
                          data-chirp="${chirp.id}"
                          data-type="${emoji}"
                          onclick="toggleReaction(this.dataset.chirp, this.dataset.type)">
                          ${emoji}
                      </button>
                  `).join('')}
              </div>
              <div class="reactor-list" id="reactor-list-${chirp.id}">
                  <div style="color:var(--text-muted);font-size:0.85rem">Loading...</div>
              </div>
          </div>
      
          <!-- comment bar -->
          <div class="comment-bar" id="comment-bar-${chirp.id}">
                <span class="comment-toggle" onclick="toggleComments('${chirp.id}')">
                    💬 ${chirp.comment_count || 0} comment${chirp.comment_count !== 1 ? 's' : ''} ›
                </span>
          </div>
          <div class="comment-section" id="comment-section-${chirp.id}"></div>
        </div>
      `).join("");

      if (append) {
        feed.insertAdjacentHTML("beforeend", html);
      } else {
        feed.innerHTML = html;
      }
    }

    const REACTIONS = ['❤️', '😂', '😮', '😢', '👍'];

    async function loadReactions(chirpId) {
      const res = await apiRequestAuth(`/api/chirps/${chirpId}/react`, 'GET');
      if (!res || !res.ok) return;
      const data = await res.json();

      const bar = document.getElementById(`reactions-${chirpId}`);
      if (!bar) return;
      bar.dataset.userReaction = data.user_reaction || ''

      // update summary button icon — shows user's reaction or ❤️ as default
      const iconEl = document.getElementById(`reaction-icon-${chirpId}`)
      if (iconEl) iconEl.textContent = data.user_reaction || '❤️'

      // update total count
      const countEl = document.getElementById(`reaction-count-${chirpId}`)
      if (countEl) countEl.textContent = data.total || 0

      // highlight active emoji in picker
      for (const emoji of REACTIONS) {
          const btn = document.getElementById(`react-${chirpId}-${encodeURIComponent(emoji)}`)
          if (btn) btn.classList.toggle('active', data.user_reaction === emoji)
      }   
      // render reactor list grouped by type with counts
      const reactorList = document.getElementById(`reactor-list-${chirpId}`)
      if (!reactorList) return   

      if (!data.reactors || data.reactors.length === 0) {
          reactorList.innerHTML = `
              <div style="color:var(--text-muted);font-size:0.85rem">
                  No reactions yet
              </div>`
          return
      }

      // group reactors by emoji type
      const grouped = {}
      for (const r of data.reactors) {
          if (!grouped[r.type]) grouped[r.type] = []
          grouped[r.type].push(r)
      }
      
      reactorList.innerHTML = Object.entries(grouped).map(([type, users]) => `
          <div class="reactor-group">
              <span class="reactor-group-label">
                  ${type} ${users.length}
              </span>
              <span class="reactor-group-users">
                  ${users.map(u =>
                      `<a href="/profile.html?user=${u.user_id}">@${escapeHTML(u.username)}</a>`
                  ).join(', ')}
              </span>
          </div>
      `).join('')
    }

    async function toggleReactionPanel(chirpId) {
        const panel = document.getElementById(`reaction-panel-${chirpId}`)
        if (!panel) return

        const isOpen = panel.style.display !== 'none'
        if (isOpen) {
            panel.style.display = 'none'
            return
        }

        panel.style.display = 'block'
        await loadReactions(chirpId)
    }    
    
    async function toggleReaction(chirpId, type) {
      const bar = document.getElementById(`reactions-${chirpId}`);
      const current = bar?.dataset.userReaction;

      if (current === type) {
        // same reaction → remove it → icon goes back to ❤️
        const res = await apiRequestAuth(`/api/chirps/${chirpId}/react`, 'DELETE');
        if (!res || !res.ok) return;
      } else {
        // new or different reaction → add/update
        const res = await apiRequestAuth(`/api/chirps/${chirpId}/react`, 'POST', { type });
        if (!res || !res.ok) return;
      }

      // refresh — icon updates to new reaction automatically
      await loadReactions(chirpId);
    }

    async function loadComments(chirpId) {
      const res = await apiRequestAuth(`/api/chirps/${chirpId}/comments`, 'GET');
      if (!res || !res.ok) return;
      const data = await res.json();

      const bar = document.getElementById(`comment-bar-${chirpId}`);
      if (bar) {
        bar.innerHTML = `<span class="comment-toggle" onclick="toggleComments('${chirpId}')">${data.total > 0 ? `${data.total} comment${data.total !== 1 ? 's' : ''}` : 'Comments'} ›</span>`;
      }

      const section = document.getElementById(`comment-section-${chirpId}`);
      if (section) {
        section.dataset.comments = JSON.stringify(data.comments || []);
        if (section.classList.contains('open')) {
          renderComments(chirpId, data.comments || []);
        }
      }
    }

    // fetch comments when section first opens
    async function toggleComments(chirpId) {
      const section = document.getElementById(`comment-section-${chirpId}`);
      if (!section) return;

      if (section.classList.contains('open')) {
        section.classList.remove('open');
        return;
      }

      section.classList.add('open');
      await loadComments(chirpId);
    }

    function renderComments(chirpId, comments) {
      const section = document.getElementById(`comment-section-${chirpId}`);
      if (!section) return;
      const myID = getCurrentUserID();

      const listHTML = comments.length === 0
        ? `<div style="color:var(--text-muted);font-size:0.85rem;padding:4px 0">No comments yet</div>`
        : comments.map(c => `
            <div class="comment-item" id="comment-${c.id}">
              <div class="comment-meta">
                <a href="/profile.html?user=${c.user_id}">@${escapeHTML(c.username)}</a>
                <span>${formatTime(c.created_at)}</span>
                ${c.user_id === myID ? `
                  <div class="comment-menu-wrapper">
                    <button class="comment-menu-btn" onclick="toggleCommentMenu('${c.id}')">⋮</button>
                    <div class="comment-menu" id="menu-${c.id}">
                      <button onclick="editComment('${c.id}', '${chirpId}')">Edit</button>
                      <button onclick="deleteComment('${c.id}', '${chirpId}')">Delete</button>
                    </div>
                  </div>
                ` : ''}
              </div>
              <div class="comment-body" id="body-${c.id}">${escapeHTML(c.body)}</div>
            </div>
          `).join('');

      section.innerHTML = `
        <div class="comment-list">${listHTML}</div>
        <div class="comment-compose">
          <input type="text" class="comment-input" id="comment-input-${chirpId}" placeholder="Write a comment..." />
          <button class="btn btn-primary btn-sm" onclick="postComment('${chirpId}')">Post</button>
        </div>
      `;

      document.getElementById(`comment-input-${chirpId}`)?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') postComment(chirpId);
      });
    }

    async function postComment(chirpId) {
      const input = document.getElementById(`comment-input-${chirpId}`);
      const body = input?.value.trim();
      if (!body) return;
      const res = await apiRequestAuth(`/api/chirps/${chirpId}/comments`, 'POST', { body });
      if (!res || !res.ok) return;
      input.value = '';
      await loadComments(chirpId);
    }

    async function deleteComment(commentId, chirpId) {
      if (!confirm('Delete this comment?')) return;
      const res = await apiRequestAuth(`/api/comments/${commentId}`, 'DELETE');
      if (!res || !res.ok) return;
      await loadComments(chirpId);
    }

    function toggleCommentMenu(commentId) {
      const menu = document.getElementById(`menu-${commentId}`);
      if (!menu) return;
      document.querySelectorAll('.comment-menu.open').forEach(m => m.classList.remove('open'));
      menu.classList.toggle('open');
    }

    function editComment(commentId, chirpId) {
      document.getElementById(`menu-${commentId}`)?.classList.remove('open');
      const bodyEl = document.getElementById(`body-${commentId}`);
      if (!bodyEl) return;
      const currentText = bodyEl.textContent;
      bodyEl.innerHTML = `
        <div class="comment-edit-compose">
          <input type="text" class="comment-input" id="edit-input-${commentId}" value="${escapeHTML(currentText)}" />
          <button class="btn btn-primary btn-sm" onclick="saveComment('${commentId}', '${chirpId}')">Save</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelEdit('${commentId}', \`${escapeHTML(currentText)}\`)">Cancel</button>
        </div>
      `;
      const input = document.getElementById(`edit-input-${commentId}`);
      input?.focus();
      input?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveComment(commentId, chirpId);
        if (e.key === 'Escape') cancelEdit(commentId, currentText);
      });
    }

    function cancelEdit(commentId, originalText) {
      const bodyEl = document.getElementById(`body-${commentId}`);
      if (bodyEl) bodyEl.innerHTML = escapeHTML(originalText);
    }

    async function saveComment(commentId, chirpId) {
      const input = document.getElementById(`edit-input-${commentId}`);
      const body = input?.value.trim();
      if (!body) return;
      const res = await apiRequestAuth(`/api/comments/${commentId}`, 'PUT', { body });
      if (!res || !res.ok) return;
      await loadComments(chirpId);
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.comment-menu-wrapper')) {
        document.querySelectorAll('.comment-menu.open').forEach(m => m.classList.remove('open'));
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.reaction-bar') && !e.target.closest('.reaction-panel')) {
        document.querySelectorAll('.reaction-panel').forEach(p => {
          p.style.display = 'none';
        });
      }
    });

    async function loadChirps(append = false) {
      let chirps = [];

      if (currentTab === "following") {
        const body = followingCursor ? { before: followingCursor } : {};
        const res = await apiRequestAuth("/api/feed", "POST", body);
        if (!res || !res.ok) return;
        chirps = await res.json();
        if (chirps.length > 0) followingCursor = chirps[chirps.length - 1].created_at;
      } else {
        const before = discoverCursor ? `&bf=${encodeURIComponent(discoverCursor)}` : "";
        const res = await apiRequestAuth(`/api/getallchirps?sort=desc${before}`, 'GET');

        if (!res.ok) return;
        chirps = await res.json();
        if (chirps.length > 0) discoverCursor = chirps[chirps.length - 1].created_at;
      }

      renderChirps(chirps, append);
      document.getElementById("loadMoreBtn").style.display = chirps.length < LIMIT ? "none" : "block";
    }

    async function loadMore() {
      await loadChirps(true);
    }

    async function deleteChirp(id) {
      if (!confirm("Delete this chirp?")) return;
      const res = await apiRequestAuth(`/api/chirps/${id}`, "DELETE");
      if (!res || !res.ok) { alert("Failed to delete chirp."); return; }
      document.getElementById(`chirp-${id}`)?.remove();
    }

    loadChirps();
  </script>
</body>
</html>
