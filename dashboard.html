<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feed – Cardinal</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <div class="search-bar" style="margin-bottom:16px">
      <input type="text" id="searchInput" placeholder="Search users by username or user ID" />
      <button class="btn btn-primary" onclick="searchUser()">Search</button>
    </div>
    <div id="searchResult" style="margin-bottom:16px"></div>

    <div class="compose-box">
      <textarea id="chirpInput" placeholder="What's happening?"></textarea>
      <div class="compose-footer">
        <span id="charCount" style="font-size:0.8rem;color:var(--text-muted);margin-right:10px"></span>
        <button class="btn btn-primary" onclick="postChirp()">Post</button>
      </div>
    </div>

    <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)">
      <button class="profile-tab active" id="tabFollowing" onclick="switchTab('following')">Following</button>
      <button class="profile-tab" id="tabDiscover" onclick="switchTab('discover')">Discover</button>
    </div>

    <div id="feed"></div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-outline" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load more</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    requireAuth();
    initNav();

    const MAX_CHARS = 500;
    const LIMIT = 20;
    const chirpInput = document.getElementById("chirpInput");

    let currentTab = "following";
    let followingCursor = null;
    let discoverCursor = null;

    chirpInput.addEventListener("input", () => {
      const el = document.getElementById("charCount");
      el.textContent = `${chirpInput.value.length}/${MAX_CHARS}`;
      el.style.color = chirpInput.value.length > MAX_CHARS - 20 ? "#b91c1c" : "var(--text-muted)";
    });

    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchUser();
    });

    async function searchUser() {
      const query = document.getElementById("searchInput").value.trim();
      const resultEl = document.getElementById("searchResult");
      if (!query) { resultEl.innerHTML = ""; return; }

      const res = await apiRequestAuth(`/api/users/${encodeURIComponent(query)}`, "GET");

      if (!res || res.status === 404) {
        resultEl.innerHTML = `<div class="empty-state">No user found for "<strong>${escapeHTML(query)}</strong>".</div>`;
        return;
      }
      if (!res.ok) {
        resultEl.innerHTML = `<div class="empty-state">Something went wrong. Try again.</div>`;
        return;
      }

      const user = await res.json();
      resultEl.innerHTML = `
        <div class="card" style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-weight:700">@${escapeHTML(user.username)}</div>
            <div style="font-size:0.85rem;color:var(--text-muted);margin-top:2px">${user.followers_count} followers · ${user.followings_count} following</div>
          </div>
          <a href="/profile.html?user=${user.id}" class="btn btn-primary btn-sm">View Profile</a>
        </div>
      `;
    }

    async function postChirp() {
      const body = chirpInput.value.trim();
      if (!body || body.length > MAX_CHARS) return;
      const res = await apiRequestAuth("/api/newchirp", "POST", { body });
      if (!res || !res.ok) { alert("Failed to post chirp."); return; }
      chirpInput.value = "";
      document.getElementById("charCount").textContent = "";
      followingCursor = null;
      discoverCursor = null;
      document.getElementById("feed").innerHTML = "";
      loadChirps();
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tabFollowing").classList.toggle("active", tab === "following");
      document.getElementById("tabDiscover").classList.toggle("active", tab === "discover");
      document.getElementById("feed").innerHTML = "";
      document.getElementById("loadMoreBtn").style.display = "none";
      followingCursor = null;
      discoverCursor = null;
      loadChirps();
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return date.toLocaleDateString();
    }

    function renderChirps(chirps, append) {
      const feed = document.getElementById("feed");
      const myID = getCurrentUserID();

      if (!append && chirps.length === 0) {
        feed.innerHTML = currentTab === "following"
          ? `<div class="empty-state">No chirps yet. Follow some users to see their chirps here.</div>`
          : `<div class="empty-state">No chirps yet. Be the first to post!</div>`;
        return;
      }

      const html = chirps.map(chirp => `
        <div class="chirp-card" id="chirp-${chirp.id}">
          <div class="chirp-card-header">
            <a class="chirp-author" href="/profile.html?user=${chirp.user_id}">@${escapeHTML(chirp.username)}</a>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="chirp-time">${formatTime(chirp.created_at)}</span>
              ${chirp.user_id === myID ? `<button class="btn btn-sm btn-danger" onclick="deleteChirp('${chirp.id}')">Delete</button>` : ""}
            </div>
          </div>
          <div class="chirp-body">${escapeHTML(chirp.body)}</div>
          <div class="reaction-bar" id="reactions-${chirp.id}"></div>
          <div class="reactor-list" id="reactor-list-${chirp.id}"></div>
        </div>
      `).join("");

      if (append) {
        feed.insertAdjacentHTML("beforeend", html);
      } else {
        feed.innerHTML = html;
      }

      chirps.forEach(c => loadReactions(c.id));
    }

    const REACTIONS = ['❤️', '😂', '😮', '😢', '👍'];

    async function loadReactions(chirpId) {
      const res = await apiRequestAuth(`/api/chirps/${chirpId}/react`, 'GET');
      if (!res || !res.ok) return;
      const data = await res.json();
      const bar = document.getElementById(`reactions-${chirpId}`);
      if (!bar) return;

      const countMap = {};
      (data.counts || []).forEach(c => countMap[c.type] = c.count);
      bar.dataset.userReaction = data.user_reaction || '';

      const total = data.total || 0;
      const totalHTML = total > 0
        ? `<span class="reaction-total" onclick="toggleReactorList('${chirpId}')">${total} reaction${total !== 1 ? 's' : ''} ›</span>`
        : '';

      bar.innerHTML = REACTIONS.map(emoji => {
        const count = countMap[emoji] || 0;
        const active = data.user_reaction === emoji ? ' active' : '';
        return `<button class="reaction-btn${active}" data-chirp="${chirpId}" data-type="${emoji}" onclick="toggleReaction(this.dataset.chirp, this.dataset.type)">${emoji}${count > 0 ? ` ${count}` : ''}</button>`;
      }).join('') + totalHTML;

      const reactorList = document.getElementById(`reactor-list-${chirpId}`);
      if (reactorList) {
        reactorList.dataset.reactors = JSON.stringify(data.reactors || []);
        if (reactorList.classList.contains('open')) {
          renderReactorList(chirpId, data.reactors || []);
        }
      }
    }

    function renderReactorList(chirpId, reactors) {
      const list = document.getElementById(`reactor-list-${chirpId}`);
      if (!list) return;
      list.innerHTML = reactors.length === 0
        ? `<div style="color:var(--text-muted)">No reactions yet</div>`
        : reactors.map(r =>
            `<div class="reactor-item"><a href="/profile.html?user=${r.user_id}">@${escapeHTML(r.username)}</a> ${r.type}</div>`
          ).join('');
    }

    function toggleReactorList(chirpId) {
      const list = document.getElementById(`reactor-list-${chirpId}`);
      if (!list) return;
      if (list.classList.contains('open')) {
        list.classList.remove('open');
        return;
      }
      const reactors = JSON.parse(list.dataset.reactors || '[]');
      renderReactorList(chirpId, reactors);
      list.classList.add('open');
    }

    async function toggleReaction(chirpId, type) {
      const bar = document.getElementById(`reactions-${chirpId}`);
      const current = bar?.dataset.userReaction;
      if (current === type) {
        const res = await apiRequestAuth(`/api/chirps/${chirpId}/react`, 'DELETE');
        if (!res || !res.ok) return;
      } else {
        const res = await apiRequestAuth(`/api/chirps/${chirpId}/react`, 'POST', { type });
        if (!res || !res.ok) return;
      }
      await loadReactions(chirpId);
    }

    async function loadChirps(append = false) {
      let chirps = [];

      if (currentTab === "following") {
        const body = followingCursor ? { before: followingCursor } : {};
        const res = await apiRequestAuth("/api/feed", "POST", body);
        if (!res || !res.ok) return;
        chirps = await res.json();
        if (chirps.length > 0) followingCursor = chirps[chirps.length - 1].created_at;
      } else {
        const before = discoverCursor ? `&bf=${encodeURIComponent(discoverCursor)}` : "";
        const res = await fetch(`/api/getallchirps?sort=desc${before}`);
        if (!res.ok) return;
        chirps = await res.json();
        if (chirps.length > 0) discoverCursor = chirps[chirps.length - 1].created_at;
      }

      renderChirps(chirps, append);
      document.getElementById("loadMoreBtn").style.display = chirps.length < LIMIT ? "none" : "block";
    }

    async function loadMore() {
      await loadChirps(true);
    }

    async function deleteChirp(id) {
      if (!confirm("Delete this chirp?")) return;
      const res = await apiRequestAuth(`/api/chirps/${id}`, "DELETE");
      if (!res || !res.ok) { alert("Failed to delete chirp."); return; }
      document.getElementById(`chirp-${id}`)?.remove();
    }

    loadChirps();
  </script>
</body>
</html>
