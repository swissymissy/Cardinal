<!DOCTYPE html>
<html>
<body>
  <h2>Post a Chirp</h2>

  <textarea id="chirp" placeholder="What's happening?"></textarea>
  <br />
  <button onclick="postChirp()">Post</button>
  <button onclick="logout()">Logout</button>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

  <script>
    async function postChirp() {
      const body = document.getElementById("chirp").value;
      const token = getAccessToken();

      const res = await apiRequest(
        "/api/newchirp",
        "POST",
        { body },
        token
      );

      alert("Chirp posted!");
    }
  </script>
</body>
</html>
