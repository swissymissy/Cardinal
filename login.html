<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – Cardinal</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="form-page">
  <div class="form-card">
    <h1>Cardinal</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="form-success" id="successMsg"></div>
    <div class="form-error" id="errorMsg"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="login()">Sign in</button>

    <div class="form-footer">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // show success message if redirected from register
    const params = new URLSearchParams(window.location.search);
    if (params.get("registered")) {
      const el = document.getElementById("successMsg");
      el.textContent = "Account created! Please sign in.";
      el.style.display = "block";
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("errorMsg");
      errorEl.style.display = "none";

      if (!email || !password) {
        errorEl.textContent = "Please fill in all fields.";
        errorEl.style.display = "block";
        return;
      }

      const res = await apiRequest("/api/userlogin", "POST", { email, password });
      if (!res.ok) {
        const data = await res.json();
        errorEl.textContent = data.error || "Invalid email or password.";
        errorEl.style.display = "block";
        return;
      }

      const data = await res.json();
      saveTokens(data.access_token, data.refresh_token);

      // fetch username since login response doesn't include it
      const userRes = await apiRequest("/api/users/" + data.id, "GET", null, data.access_token);
      if (userRes.ok) {
        const user = await userRes.json();
        saveUserInfo(data.id, user.username);
      } else {
        saveUserInfo(data.id, email);
      }

      window.location.href = "/dashboard.html";
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
