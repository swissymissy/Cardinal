<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cardinal</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .landing-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .landing-title {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .landing-subtitle {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .landing-actions {
      display: flex;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="landing">
    <img src="/assets/cardinal.jpg" alt="Cardinal" class="landing-logo">
    <div class="landing-title">Cardinal</div>
    <p class="landing-subtitle">
      A simple social platform. Post short thoughts, follow people you like, and stay in the loop.
    </p>
    <div class="landing-actions">
      <a href="/login.html" class="btn btn-primary">Sign in</a>
      <a href="/register.html" class="btn btn-outline">Create account</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    if (getAccessToken()) {
      window.location.href = "/dashboard.html";
    }
  </script>
</body>
</html>
