<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register – Cardinal</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="form-page">
  <div class="form-card">
    <h1>Cardinal</h1>
    <p class="subtitle">Create your account</p>

    <div class="form-error" id="errorMsg"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="yourname" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn btn-primary" style="width:100%" onclick="register()">Create account</button>

    <div class="form-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    async function register() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("errorMsg");
      errorEl.style.display = "none";

      if (!username || !email || !password) {
        errorEl.textContent = "Please fill in all fields.";
        errorEl.style.display = "block";
        return;
      }

      const res = await apiRequest("/api/newuser", "POST", { username, email, password });
      if (!res.ok) {
        const data = await res.json();
        errorEl.textContent = data.error || "Could not create account. Email or username may already be taken.";
        errorEl.style.display = "block";
        return;
      }

      window.location.href = "/login.html?registered=1";
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") register();
    });
  </script>
</body>
</html>
